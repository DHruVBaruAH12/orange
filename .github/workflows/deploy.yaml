name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  deploy:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          passphrase: ${{ secrets.PASSPHRASE }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /orange
            git pull
            npm install
            npm run build
            # Remove previous build files from Nginx directory
            sudo rm -rf /var/www/vhost/frontend/*
            # Copy new build files to Nginx serving directory
            sudo cp -r dist/* /var/www/vhost/frontend/
            # Restart Nginx to ensure changes are applied
            sudo systemctl restart nginx
