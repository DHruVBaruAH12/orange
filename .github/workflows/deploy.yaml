name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          passphrase: ${{ secrets.PASSPHRASE }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /orange || exit 1
            git pull origin main || exit 1
            npm ci || exit 1
            npm run build || exit 1
            # Remove previous build files from Nginx directory
            sudo rm -rf /var/www/vhost/frontend/* || exit 1
            # Copy new build files to Nginx serving directory
            sudo cp -r dist/* /var/www/vhost/frontend/ || exit 1
            # Restart Nginx to ensure changes are applied
            sudo systemctl restart nginx || exit 1
